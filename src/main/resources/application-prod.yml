server:
  port: 8080

spring:
  main:
    lazy-initialization: true   # defer bean creation → faster startup on Render

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: none        # Flyway owns the schema; skip Hibernate validation entirely
    show-sql: false
    properties:
      hibernate:
        # dialect auto-detected — no need to specify (removes WARN + saves init time)
    open-in-view: false

management:
  health:
    mail:
      enabled: false

logging:
  level:
    com.qms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
