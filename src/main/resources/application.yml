  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: simple

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F442847}
  expiration-ms: ${JWT_EXPIRATION:86400000}       # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH:604800000} # 7 days
  access-token-expiry-ms: 86400000
  refresh-token-expiry-ms: 604800000
# ===== FILE STORAGE =====
app:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  pagination:
    default-page-size: 20
    max-page-size: 100

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== LOGGING =====
logging:
  level:
    com.qms: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===== SPRINGDOC =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: QMS API
    version: v1
    description: Enterprise Quality Management System REST API

dms:
  upload:
    allowed-mime-types: application/pdf,image/png,image/jpeg
    max-file-size-mb: 10
